<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記帳本本 - 旅遊護照版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FAF9F6;
            color: #4A6361;
            margin: 0;
            padding: 0;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .pastel-gradient { background: linear-gradient(135deg, #CEE5D0 0%, #E0F2FE 100%); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .passport-card { background: #fff; border: 2px dashed #E5E1C4; position: relative; cursor: pointer; }
        .passport-stamp { position: absolute; right: 20px; top: 20px; transform: rotate(-15deg); opacity: 0.15; pointer-events: none; }
        .lucide { display: inline-block; vertical-align: middle; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        const EXCHANGE_RATE = 31;

        // --- 輔助函數：格式化金額 ---
        const formatMoney = (val) => {
            return Number(val).toLocaleString(undefined, { 
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2 
            });
        };

        // --- Lucide Icon 組件 ---
        const Icon = ({ name, size = 24, strokeWidth = 2, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        attrs: {
                            'stroke-width': strokeWidth,
                            width: size,
                            height: size,
                            class: `lucide lucide-${name.toLowerCase()} ${className}`
                        }
                    });
                }
            }, [name, size, strokeWidth, className]);
            return <i ref={iconRef} data-lucide={name} className="not-italic flex items-center justify-center" />;
        };

        // --- 雙線趨勢圖組件 ---
        const DualTrendChart = ({ data }) => {
            if (!data || data.length < 2) return (
                <div className="h-32 flex flex-col items-center justify-center text-[10px] text-gray-300 bg-gray-50/50 rounded-[2rem] border border-dashed border-gray-200 mt-4">
                    <Icon name="TrendingUp" size={20} className="mb-2 opacity-30" />
                    填入更多數據以繪製資產曲線
                </div>
            );
            const maxVal = Math.max(...data.map(d => Math.max(d.usd, d.twd / EXCHANGE_RATE))) * 1.1 || 100;
            const width = 300; const height = 100;
            const usdPoints = data.map((d, i) => ({ x: (i / (data.length - 1)) * width, y: height - (d.usd / maxVal) * height }));
            const twdPoints = data.map((d, i) => ({ x: (i / (data.length - 1)) * width, y: height - ((d.twd / EXCHANGE_RATE) / maxVal) * height }));
            const pathData = (pts) => `M ${pts.map(p => `${p.x},${p.y}`).join(' L ')}`;
            return (
                <div className="w-full mt-6 px-2">
                    <div className="flex gap-4 mb-4">
                        <div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full bg-sky-400 shadow-[0_0_5px_rgba(56,189,248,0.5)]"></div><span className="text-[10px] font-black uppercase tracking-widest text-sky-500">USD Assets</span></div>
                        <div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-[0_0_5px_rgba(16,185,129,0.5)]"></div><span className="text-[10px] font-black uppercase tracking-widest text-emerald-500">TWD Assets</span></div>
                    </div>
                    <div className="h-32 relative">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full overflow-visible">
                            <path d={pathData(usdPoints)} fill="none" stroke="#38BDF8" strokeWidth="3" strokeLinecap="round" />
                            <path d={pathData(twdPoints)} fill="none" stroke="#10B981" strokeWidth="3" strokeLinecap="round" />
                        </svg>
                    </div>
                </div>
            );
        };

        const App = () => {
            const now = new Date();
            const currentYearMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            const todayStr = now.toISOString().split('T')[0];

            // --- 狀態管理 ---
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedTripId, setSelectedTripId] = useState(null); 
            const [selectedArchiveMonth, setSelectedArchiveMonth] = useState(null);
            
            const [showAccountModal, setShowAccountModal] = useState(false);
            const [showInvestModal, setShowInvestModal] = useState(false);
            const [showUpdateModal, setShowUpdateModal] = useState(null);
            const [showBudgetModal, setShowBudgetModal] = useState(false);
            const [showTripModal, setShowTripModal] = useState(false);
            const [viewHistoryId, setViewHistoryId] = useState(null);

            const [transactions, setTransactions] = useState([]);
            const [accounts, setAccounts] = useState([
                { id: 'default-acc', name: 'Chase Checking', balance: 0.00, currency: 'USD', location: '美國', lastBalance: 0.00 }
            ]);
            const [investments, setInvestments] = useState([]);
            const [assetHistory, setAssetHistory] = useState([]);
            const [trips, setTrips] = useState([]);
            const [editingTx, setEditingTx] = useState(null);

            // 更新預算類別
            const [budgets, setBudgets] = useState({
                '超市生鮮': 500.00,
                '外食餐飲': 300.00,
                '居家日用': 100.00,
                '居住固定': 1500.00,
                '交通運輸': 200.00,
                '個人美妝': 150.00,
                '娛樂生活': 150.00,
            });

            const [houseGoal, setHouseGoal] = useState({
                target: 200000.00, 
                deadline: `${now.getFullYear() + 10}-12-31`, 
            });

            // --- 計算邏輯 ---
            const toUSD = (amount, currency) => currency === 'TWD' ? amount / EXCHANGE_RATE : amount;
            
            const netWorthUSD = useMemo(() => {
                const accTotal = accounts.reduce((sum, acc) => sum + (acc.currency === 'TWD' ? acc.balance / EXCHANGE_RATE : acc.balance), 0);
                const investTotal = investments.reduce((sum, inv) => sum + (inv.currency === 'TWD' ? inv.currentVal / EXCHANGE_RATE : inv.currentVal), 0);
                return accTotal + investTotal;
            }, [accounts, investments]);

            const getMonthlyData = (monthStr) => {
                const monthlyTxs = transactions.filter(t => t.month === monthStr);
                const nonTravelTxs = monthlyTxs.filter(t => t.type !== 'travel');
                const totalSpentUSD = nonTravelTxs.reduce((sum, t) => sum + toUSD(t.amount, t.currency), 0);
                const needTotal = nonTravelTxs.filter(t => t.type === 'need').reduce((sum, t) => sum + toUSD(t.amount, t.currency), 0);
                const wantTotal = nonTravelTxs.filter(t => t.type === 'want').reduce((sum, t) => sum + toUSD(t.amount, t.currency), 0);
                const catStats = {};
                nonTravelTxs.forEach(t => { catStats[t.category] = (catStats[t.category] || 0) + toUSD(t.amount, t.currency); });
                return { monthlyTxs, totalSpentUSD, catStats, needTotal, wantTotal };
            };

            const { totalSpentUSD: currentTotalSpentUSD, catStats: currentCatStats, needTotal, wantTotal } = getMonthlyData(currentYearMonth);

            const totalTravelSpent = useMemo(() => {
                return transactions.filter(t => t.type === 'travel').reduce((sum, t) => sum + toUSD(t.amount, t.currency), 0);
            }, [transactions]);

            const availableMonths = useMemo(() => {
                const months = [...new Set([currentYearMonth, ...transactions.map(t => t.month)])];
                return months.sort().reverse();
            }, [transactions, currentYearMonth]);

            const handleUpdateValue = (newVal) => {
                const { type, item } = showUpdateModal;
                const valueNum = parseFloat(newVal);
                let updatedAccs = [...accounts]; let updatedInvs = [...investments];
                if (type === 'acc') { updatedAccs = accounts.map(acc => acc.id === item.id ? { ...acc, balance: valueNum } : acc); setAccounts(updatedAccs); }
                else { updatedInvs = investments.map(inv => inv.id === item.id ? { ...inv, currentVal: valueNum, history: [{ date: todayStr, amount: valueNum, diff: valueNum - inv.currentVal, percent: inv.currentVal > 0 ? ((valueNum/inv.currentVal-1)*100).toFixed(2) : 0 }, ...(inv.history || [])] } : inv); setInvestments(updatedInvs); }
                
                const curUSD = updatedAccs.filter(a => a.currency === 'USD').reduce((s, a) => s + a.balance, 0) + updatedInvs.filter(i => i.currency === 'USD').reduce((s, i) => s + i.currentVal, 0);
                const curTWD = updatedAccs.filter(a => a.currency === 'TWD').reduce((s, a) => s + a.balance, 0) + updatedInvs.filter(i => i.currency === 'TWD').reduce((s, i) => s + i.currentVal, 0);
                const newH = [...assetHistory]; const idx = newH.findIndex(h => h.date === currentYearMonth);
                if (idx >= 0) newH[idx] = { date: currentYearMonth, usd: curUSD, twd: curTWD };
                else newH.push({ date: currentYearMonth, usd: curUSD, twd: curTWD });
                setAssetHistory(newH); setShowUpdateModal(null);
            };

            // --- 視圖組件 ---
            const TripDetailView = ({ tripId }) => {
                const trip = trips.find(t => t.id === tripId);
                const tripTxs = transactions.filter(t => t.tripId === tripId);
                const tripTotal = tripTxs.reduce((sum, t) => sum + toUSD(t.amount, t.currency), 0);
                const handleAddTripExp = () => {
                    const t = document.getElementById('tx-trip-t').value;
                    const a = document.getElementById('tx-trip-a').value;
                    if (t && a) {
                        setTransactions([{ id: Date.now(), title: t, amount: parseFloat(a), category: '旅遊', type: 'travel', currency: 'USD', month: currentYearMonth, date: todayStr, tripId }, ...transactions]);
                        document.getElementById('tx-trip-t').value = ''; document.getElementById('tx-trip-a').value = '';
                    }
                };
                return (
                    <div className="space-y-6 fade-in pb-12 text-[#4A6361]">
                        <div className="flex items-center gap-3"><button onClick={() => setSelectedTripId(null)} className="p-3 bg-white rounded-2xl text-[#8EAC8D] shadow-sm active:scale-90 transition-all"><Icon name="ChevronLeft" /></button><h2 className="text-2xl font-black">{trip.name} 帳本</h2></div>
                        <div className="bg-[#4A6361] p-8 rounded-[3.5rem] text-white shadow-xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-8 opacity-10"><Icon name="Globe" size={100} /></div>
                            <p className="text-[10px] font-black uppercase tracking-[0.3em] opacity-40">Journey Expenditure</p>
                            <h3 className="text-3xl font-black mt-2">${formatMoney(tripTotal)} <span className="text-xs font-normal opacity-50">USD</span></h3>
                            <div className="flex items-center gap-2 mt-4 text-[11px] font-bold text-[#CEE5D0]"><Icon name="MapPin" size={12} /> {trip.location} · {trip.dateRange}</div>
                        </div>
                        <div className="bg-white p-7 rounded-[3rem] shadow-sm border border-[#CEE5D0]">
                            <h4 className="text-xs font-black text-[#8EAC8D] uppercase tracking-widest mb-4">新增旅程開支</h4>
                            <div className="flex flex-col gap-4">
                                <input id="tx-trip-t" placeholder="項目 (例如: 門票)" className="w-full p-4 rounded-2xl bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0]" />
                                <div className="flex gap-3"><input id="tx-trip-a" type="number" step="0.01" placeholder="0.00" className="flex-1 p-4 rounded-2xl bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0]" /><button onClick={handleAddTripExp} className="bg-[#8EAC8D] text-white px-6 rounded-2xl font-black shadow-md active:scale-95 transition-all"><Icon name="Plus" /></button></div>
                            </div>
                        </div>
                        <div className="space-y-4 pb-10">
                            <h4 className="text-[10px] font-black text-[#BCC1B1] uppercase tracking-[0.3em] px-4">明細紀錄</h4>
                            {tripTxs.length === 0 ? (<div className="text-center py-10 italic text-[#BCC1B1] text-xs">尚無開支...</div>) : tripTxs.map(t => (
                                <div key={t.id} className="bg-white p-6 rounded-[2.5rem] border border-[#F3F0D7] flex items-center justify-between group relative">
                                    <div className="flex items-center gap-4"><div className="p-3 bg-[#E0F2FE] rounded-2xl text-sky-400"><Icon name="Ticket" size={18} /></div><div><p className="font-black text-sm">{t.title}</p><p className="text-[9px] text-[#BCC1B1] font-bold uppercase tracking-widest">{t.date}</p></div></div>
                                    <p className="font-black text-base">${formatMoney(t.amount)}</p>
                                    <button onClick={() => setTransactions(transactions.filter(i => i.id !== t.id))} className="absolute -left-2 -top-2 p-2 bg-white rounded-full shadow-md text-rose-300 opacity-0 group-hover:opacity-100 transition-all"><Icon name="X" size={10}/></button>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const TravelPassportMainView = () => (
                <div className="space-y-6 fade-in pb-12">
                    <div className="bg-[#4A6361] p-9 rounded-[3.5rem] text-white shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-8 opacity-10"><Icon name="Plane" size={100} /></div>
                        <div className="relative z-10">
                            <h2 className="text-3xl font-black italic tracking-tighter text-[#CEE5D0]">旅遊護照</h2>
                            <p className="text-[10px] font-black uppercase tracking-[0.3em] opacity-60 mt-1">Travel Passport & Journal</p>
                            <div className="grid grid-cols-2 gap-4 mt-8 pt-8 border-t border-white/10">
                                <div><p className="text-[9px] font-black uppercase opacity-40">已完成旅程</p><p className="text-2xl font-black">{trips.length} <span className="text-xs opacity-50">STAMPS</span></p></div>
                                <div><p className="text-[9px] font-black uppercase opacity-40">足跡總費用</p><p className="text-2xl font-black">${formatMoney(totalTravelSpent)} <span className="text-xs opacity-50">USD</span></p></div>
                            </div>
                        </div>
                    </div>
                    <button onClick={() => setShowTripModal(true)} className="w-full bg-white p-6 rounded-[2.5rem] border-2 border-dashed border-[#CEE5D0] text-[#8EAC8D] font-black flex items-center justify-center gap-2 hover:bg-[#FAF9F6] transition-all active:scale-95"><Icon name="PlusCircle" /> 開啟一段新旅程</button>
                    <div className="space-y-6">
                        {trips.length === 0 ? (<div className="py-20 text-center text-[#BCC1B1] italic text-sm">還沒有留下旅行的印記...</div>) : trips.map(trip => (
                            <div key={trip.id} onClick={() => setSelectedTripId(trip.id)} className="passport-card p-8 rounded-[3.5rem] shadow-sm hover:scale-[1.02] transition-all group overflow-hidden">
                                <div className="passport-stamp text-[#8EAC8D]"><Icon name="Compass" size={80} /></div>
                                <div className="flex justify-between items-start mb-4">
                                    <div><h3 className="text-xl font-black">{trip.name}</h3><div className="flex items-center gap-2 text-[#8EAC8D] font-black text-[10px] uppercase mt-1 tracking-widest"><Icon name="MapPin" size={10} /> {trip.location}</div></div>
                                    <div className="text-right">
                                        <p className="text-[9px] font-black text-[#BCC1B1] uppercase">{trip.dateRange}</p>
                                        <p className="text-xl font-black mt-1">${formatMoney(transactions.filter(t => t.tripId === trip.id).reduce((s,t)=>s+toUSD(t.amount, t.currency),0))}</p>
                                    </div>
                                </div>
                                <div className="p-4 bg-[#FAF9F6] rounded-2xl border border-[#F3F0D7] text-[11px] leading-relaxed text-[#7A745C] font-medium">"{trip.memo || '開啟冒險細節...'}"</div>
                                <div className="mt-4 flex justify-end text-[9px] font-black text-[#8EAC8D] uppercase tracking-widest items-center gap-1">開啟小帳本 <Icon name="ChevronRight" size={12}/></div>
                                <button onClick={(e) => { e.stopPropagation(); if(confirm('確定要刪除這段旅程與相關紀錄嗎？')) { setTrips(trips.filter(t => t.id !== trip.id)); setTransactions(transactions.filter(t => t.tripId !== trip.id)); } }} className="absolute -left-2 -top-2 p-2 bg-white rounded-full text-rose-300 shadow-md opacity-0 group-hover:opacity-100 transition-all active:scale-90"><Icon name="Trash2" size={12}/></button>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen pb-36 font-sans text-[#4A6361] overflow-x-hidden selection:bg-[#CEE5D0]">
                    
                    {/* --- Modals --- */}
                    {showTripModal && (
                        <div className="fixed inset-0 z-[1200] flex items-center justify-center p-6 bg-[#4A6361]/60 backdrop-blur-md">
                            <div className="bg-white w-full max-w-sm rounded-[3.5rem] p-10 shadow-2xl border border-[#CEE5D0]">
                                <div className="flex justify-between items-center mb-8 font-black text-2xl">新旅程規劃<button onClick={() => setShowTripModal(false)} className="active:scale-90 transition-all"><Icon name="X" /></button></div>
                                <div className="space-y-6">
                                    <input placeholder="旅程名稱" className="w-full p-5 rounded-2xl bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0]" id="tn-trip-in" />
                                    <input placeholder="目的地" className="w-full p-5 rounded-2xl bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0]" id="tl-trip-in" />
                                    <input placeholder="日期範圍" className="w-full p-5 rounded-2xl bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0]" id="td-trip-in" />
                                    <textarea placeholder="寫下一點冒險的心情..." className="w-full p-5 rounded-2xl bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0] h-24" id="tm-trip-in"></textarea>
                                    <button onClick={() => {
                                        const n = document.getElementById('tn-trip-in').value; const l = document.getElementById('tl-trip-in').value;
                                        const d = document.getElementById('td-trip-in').value; const m = document.getElementById('tm-trip-in').value;
                                        if(n && l) { setTrips([{ id: Date.now().toString(), name: n, location: l, dateRange: d, memo: m }, ...trips]); setShowTripModal(false); }
                                    }} className="w-full bg-[#8EAC8D] text-white p-6 rounded-3xl font-black shadow-xl active:scale-95 transition-all">開始蓋章</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showBudgetModal && (
                        <div className="fixed inset-0 z-[1000] flex items-center justify-center p-6 bg-[#4A6361]/40 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl border border-[#CEE5D0]">
                                <div className="flex justify-between items-center mb-6 font-black text-xl">預算設定 (USD)<button onClick={() => setShowBudgetModal(false)}><Icon name="X" /></button></div>
                                <div className="space-y-4 max-h-[50vh] overflow-y-auto pr-2 scrollbar-hide">
                                    {Object.entries(budgets).map(([cat, limit]) => (<div key={cat} className="space-y-1"><label className="text-[10px] font-black text-gray-400 ml-2">{cat}</label><input type="number" step="0.01" className="w-full p-4 rounded-2xl bg-[#FAF9F6] outline-none font-bold text-[#4A6361]" defaultValue={limit} onBlur={(e) => setBudgets({...budgets, [cat]: parseFloat(e.target.value)})} /></div>))}
                                </div>
                                <button onClick={() => setShowBudgetModal(false)} className="w-full bg-[#8EAC8D] text-white p-5 rounded-2xl font-black mt-6 shadow-lg active:scale-95 transition-all">確認完成</button>
                            </div>
                        </div>
                    )}

                    {showUpdateModal && (
                        <div className="fixed inset-0 z-[1100] flex items-center justify-center p-6 bg-[#4A6361]/70 backdrop-blur-md animate-in zoom-in-95">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl text-center border border-[#CEE5D0]">
                                <h3 className="font-black text-xl mb-2">更新數據</h3>
                                <p className="text-[10px] text-gray-400 mb-6 font-black uppercase tracking-[0.2em]">{showUpdateModal.item.name}</p>
                                <input type="number" id="upd-v-in" step="0.01" autoFocus className="w-full p-6 rounded-2xl bg-[#FAF9F6] border-2 border-[#CEE5D0] text-3xl font-black text-center mb-6 outline-none text-[#4A6361]" defaultValue={showUpdateModal.item.balance ?? showUpdateModal.item.currentVal} />
                                <div className="flex gap-3"><button onClick={() => setShowUpdateModal(null)} className="flex-1 p-5 rounded-2xl font-bold bg-gray-100 text-gray-400 active:scale-95 transition-all">取消</button><button onClick={() => handleUpdateValue(document.getElementById('upd-v-in').value)} className="flex-[2] p-5 rounded-2xl font-black bg-[#8EAC8D] text-white shadow-xl active:scale-95 transition-all">更新存檔</button></div>
                            </div>
                        </div>
                    )}

                    {showAccountModal && (
                        <div className="fixed inset-0 z-[1000] flex items-center justify-center p-6 bg-[#4A6361]/40 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl border border-[#CEE5D0]">
                                <div className="flex justify-between items-center mb-6 font-black text-xl">新增帳戶<button onClick={() => setShowAccountModal(false)}><Icon name="X"/></button></div>
                                <div className="space-y-4">
                                    <input placeholder="帳戶名稱 (如 Chase)" className="w-full p-4 rounded-2xl bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0]" id="an-in" />
                                    <input type="number" step="0.01" placeholder="初始餘額 (0.00)" className="w-full p-4 rounded-2xl bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0]" id="ab-in" />
                                    <div className="flex gap-2">
                                        <select className="flex-1 p-5 rounded-2xl bg-[#FAF9F6] text-sm font-bold" id="ac-in"><option value="USD">USD</option><option value="TWD">TWD</option></select>
                                        <select className="flex-1 p-5 rounded-2xl bg-[#FAF9F6] text-sm font-bold" id="al-in"><option value="美國">美國</option><option value="台灣">台灣</option></select>
                                    </div>
                                    <button onClick={() => {
                                        const n = document.getElementById('an-in').value; const b = document.getElementById('ab-in').value;
                                        const c = document.getElementById('ac-in').value; const l = document.getElementById('al-in').value;
                                        if(n && b) { setAccounts([...accounts, { id: Date.now(), name: n, balance: parseFloat(b), currency: c, location: l, lastBalance: parseFloat(b) }]); setShowAccountModal(false); }
                                    }} className="w-full bg-[#8EAC8D] text-white p-5 rounded-2xl font-black shadow-lg active:scale-95 transition-all">儲存帳戶</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showInvestModal && (
                        <div className="fixed inset-0 z-[1000] flex items-center justify-center p-6 bg-[#4A6361]/40 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl border border-[#CEE5D0]">
                                <div className="flex justify-between items-center mb-6 font-black text-xl">新增投資<button onClick={() => setShowInvestModal(false)}><Icon name="X"/></button></div>
                                <div className="space-y-4">
                                    <input placeholder="資產名稱" className="w-full p-4 rounded-2xl bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0]" id="in-in" />
                                    <input type="number" step="0.01" placeholder="目前現值 (0.00)" className="w-full p-4 rounded-2xl bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0]" id="iv-in" />
                                    <select className="w-full p-5 rounded-2xl bg-[#FAF9F6] text-sm font-bold" id="ic-in"><option value="USD">USD</option><option value="TWD">TWD</option></select>
                                    <button onClick={() => {
                                        const n = document.getElementById('in-in').value; const v = document.getElementById('iv-in').value; const c = document.getElementById('ic-in').value;
                                        if(n && v) { setInvestments([...investments, { id: Date.now(), name: n, currentVal: parseFloat(v), currency: c, lastVal: parseFloat(v), history: [{date: todayStr, amount: parseFloat(v), diff: 0, percent: 0}] }]); setShowInvestModal(false); }
                                    }} className="w-full bg-[#4A6361] text-white p-5 rounded-2xl font-black shadow-lg active:scale-95 transition-all">儲存投資</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- Header --- */}
                    <header className="p-12 pb-8 flex justify-between items-center">
                        <div><h1 className="text-4xl font-black tracking-tighter italic text-[#4A6361]">記帳<span className="text-sky-400 not-italic">本本</span></h1></div>
                        <button onClick={() => { setActiveTab('archive'); }} className={`w-15 h-15 rounded-[2.5rem] flex items-center justify-center border transition-all active:scale-90 ${activeTab === 'archive' ? 'bg-[#4A6361] text-[#CEE5D0] shadow-xl border-transparent' : 'bg-white text-[#8EAC8D] border-[#CEE5D0] shadow-sm'}`}><Icon name="History" size={28} /></button>
                    </header>

                    {/* --- Main --- */}
                    <main className="px-7 space-y-6">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 fade-in">
                                <div className="bg-white p-8 rounded-[3.5rem] border border-[#F3F0D7] shadow-sm">
                                    <div className="flex justify-between items-center mb-5"><h3 className="text-xs font-black text-[#4A6361] uppercase tracking-[0.2em] flex items-center gap-2"><Icon name="PieChart" size={14} className="text-[#8EAC8D]"/> 消費結構分析</h3></div>
                                    <div className="flex gap-1.5 h-4 rounded-full overflow-hidden bg-gray-50"><div className="bg-[#8EAC8D] h-full transition-all duration-1000 shadow-inner" style={{ width: `${currentTotalSpentUSD > 0 ? (needTotal / (needTotal + wantTotal)) * 100 : 0}%` }} /><div className="bg-[#F3F0D7] h-full transition-all duration-1000 shadow-inner" style={{ width: `${currentTotalSpentUSD > 0 ? (wantTotal / (needTotal + wantTotal)) * 100 : 0}%` }} /></div>
                                    <div className="flex justify-between mt-5 text-[10px] font-black uppercase tracking-widest text-[#BCC1B1]"><div>必要 Need {currentTotalSpentUSD > 0 ? ((needTotal / (needTotal + wantTotal)) * 100).toFixed(0) : 0}%</div><div>想要 Want {currentTotalSpentUSD > 0 ? ((wantTotal / (needTotal + wantTotal)) * 100).toFixed(0) : 0}%</div></div>
                                </div>
                                <div className="bg-[#CEE5D0] p-9 rounded-[3.5rem] text-[#4A6361] shadow-2xl border border-[#B8D4BB]">
                                    <p className="opacity-80 text-[10px] font-black uppercase tracking-widest">本月日常支出 (USD)</p>
                                    <h2 className="text-4xl font-black mt-3">${formatMoney(currentTotalSpentUSD)}</h2>
                                    <div className="mt-8 bg-white/30 h-4.5 rounded-full overflow-hidden"><div className="bg-[#8EAC8D] h-full rounded-full transition-all duration-1000 shadow-sm" style={{ width: `${Math.min((currentTotalSpentUSD / (Object.values(budgets).reduce((s,v)=>s+v,0))) * 100, 100)}%` }} /></div>
                                    <div className="flex justify-between mt-4 text-[10px] font-black text-[#5F7A61]"><span>支出進度</span><span>總預算 ${formatMoney(Object.values(budgets).reduce((s,v)=>s+v,0))}</span></div>
                                </div>
                                <section className="px-1 pb-10">
                                    <div className="flex justify-between items-center mb-6 font-black"><h3 className="text-lg flex items-center gap-2"><Icon name="Activity" size={18} className="text-[#8EAC8D]" /> 預算管理 (Budget)</h3><button onClick={() => setShowBudgetModal(true)} className="p-2 bg-white rounded-xl shadow-sm border border-[#F3F0D7] text-[#8EAC8D] active:scale-90 transition-all"><Icon name="Settings2" size={16}/></button></div>
                                    <div className="grid grid-cols-1 gap-4">
                                        {Object.entries(budgets).map(([cat, limit]) => {
                                            const spent = currentCatStats[cat] || 0; const percent = (spent / limit) * 100;
                                            return (<div key={cat} className="bg-white p-7 rounded-[2.5rem] border border-[#F3F0D7] flex items-center justify-between shadow-sm transition-all hover:scale-[1.02]"><div><p className="font-black">{cat}</p><span className={`text-[9px] font-black uppercase ${percent > 100 ? 'text-rose-400' : 'text-[#A39E82]'}`}>{percent > 100 ? '⚠️ 已透支' : `消耗 ${percent.toFixed(0)}%`}</span></div><div className="text-right"><p className="font-mono font-black text-xl text-[#8EAC8D]">${formatMoney(spent)}</p><p className="text-[9px] text-gray-300 font-bold uppercase tracking-tighter">MAX ${formatMoney(limit)}</p></div></div>);
                                        })}
                                    </div>
                                </section>
                            </div>
                        )}

                        {activeTab === 'record' && (
                            <div className="fade-in pb-12">
                                <div className="bg-white p-10 rounded-[4rem] shadow-sm border border-[#CEE5D0]">
                                    <div className="flex justify-between items-center mb-10 font-black"><h3 className="text-2xl tracking-tight">{editingTx ? '修改紀錄' : '新增紀錄'}</h3><div className="bg-[#F8F9F4] px-5 py-2.5 rounded-2xl text-[10px] text-[#8EAC8D]">USD</div></div>
                                    <div className="space-y-8">
                                        <div className="space-y-2"><label className="text-[10px] font-black text-gray-300 uppercase ml-3">花費項目</label><input placeholder="例如：保養精華、拿鐵咖啡..." className="w-full p-6 rounded-[2.2rem] bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0]" id="tn-m-in" defaultValue={editingTx?.title || ''} /></div>
                                        <div className="space-y-2"><label className="text-[10px] font-black text-gray-300 uppercase ml-3">金額</label><div className="relative"><input type="number" step="0.01" placeholder="0.00" className="w-full p-6 rounded-[2.2rem] bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0] transition-all" id="ta-m-in" defaultValue={editingTx?.amount || ''} /><span className="absolute right-8 top-1/2 -translate-y-1/2 font-black text-[#CEE5D0] text-xs">USD</span></div></div>
                                        <div className="flex gap-4">
                                            <div className="flex-1 space-y-2"><label className="text-[10px] font-black text-gray-300 ml-3 uppercase tracking-widest">類別</label><select className="w-full p-6 rounded-[2.2rem] bg-[#FAF9F6] text-sm font-bold outline-none border-2 border-transparent focus:border-[#CEE5D0]" id="tc-m-in" defaultValue={editingTx?.category || '超市生鮮'}>{Object.keys(budgets).map(c => <option key={c}>{c}</option>)}<option value="旅遊">旅遊</option></select></div>
                                            <div className="flex-1 space-y-2"><label className="text-[10px] font-black text-gray-300 ml-3 uppercase tracking-widest">性質</label><select className="w-full p-6 rounded-[2.2rem] bg-[#FAF9F6] text-sm font-bold outline-none border-2 border-transparent focus:border-[#CEE5D0]" id="ty-m-in" defaultValue={editingTx?.type || 'need'}><option value="need">必要 🌿</option><option value="want">想要 ✨</option><option value="travel">旅遊 🌊</option></select></div>
                                        </div>
                                        {trips.length > 0 && (
                                            <div className="space-y-2 animate-in slide-in-from-bottom-2">
                                                <label className="text-[10px] font-black text-sky-400 uppercase tracking-widest ml-3">關聯旅程 (若屬旅遊)</label>
                                                <select className="w-full p-6 rounded-[2.2rem] bg-[#E0F2FE]/30 text-sm font-bold outline-none border-2 border-transparent focus:border-sky-200" id="tx-tr-in">
                                                    <option value="">不關聯特定旅程</option>
                                                    {trips.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                                </select>
                                            </div>
                                        )}
                                        <button onClick={() => {
                                            const n = document.getElementById('tn-m-in').value; const a = document.getElementById('ta-m-in').value;
                                            const c = document.getElementById('tc-m-in').value; const y = document.getElementById('ty-m-in').value;
                                            const tr = document.getElementById('tx-tr-in')?.value || null;
                                            if(n && a) {
                                                if(editingTx) { setTransactions(transactions.map(i => i.id === editingTx.id ? {...i, title:n, amount:parseFloat(a), category:c, type:y, tripId: tr} : i)); setEditingTx(null); }
                                                else { setTransactions([{ id: Date.now(), title: n, amount: parseFloat(a), category: c, type: y, currency: 'USD', month: currentYearMonth, date: todayStr, tripId: tr }, ...transactions]); }
                                                setActiveTab('dashboard');
                                            }
                                        }} className="w-full bg-[#8EAC8D] text-white p-7 rounded-[2.5rem] font-black shadow-2xl active:scale-95 text-lg transition-all tracking-widest">記錄到本本</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'passport' && (selectedTripId ? <TripDetailView tripId={selectedTripId} /> : <TravelPassportMainView />)}

                        {activeTab === 'goals' && (
                            <div className="space-y-8 pb-12 fade-in">
                                <section className="bg-white p-10 rounded-[3.5rem] border border-[#CEE5D0] shadow-sm font-black"><div className="flex items-center gap-2 text-[#4A6361] text-sm uppercase tracking-widest mb-6"><Icon name="TrendingUp" size={16} strokeWidth={3} /> 資產趨勢 (USD & TWD)</div><DualTrendChart data={assetHistory} /></section>
                                <section>
                                    <div className="flex justify-between items-center mb-6 px-4 font-black"><h3 className="text-xl">帳戶與資產</h3><button onClick={() => setShowAccountModal(true)} className="text-[#8EAC8D] text-[10px] bg-white px-5 py-2.5 rounded-full shadow-sm border border-[#CEE5D0] active:scale-95 transition-all flex items-center gap-1 uppercase tracking-widest"><Icon name="Plus" size={14} /> 新增帳戶</button></div>
                                    <div className="grid grid-cols-1 gap-5">{accounts.map(acc => (
                                        <div key={acc.id} className="bg-white p-8 rounded-[3rem] border border-[#CEE5D0] flex items-center justify-between shadow-sm relative group transition-all hover:translate-y-[-2px]">
                                            <div className="flex items-center gap-5"><div className={`p-5 rounded-[1.5rem] ${acc.currency === 'USD' ? 'bg-sky-50 text-sky-400' : 'bg-emerald-50 text-emerald-400'}`}><Icon name="DollarSign" strokeWidth={3}/></div><div><div className="flex items-center gap-2 font-black"><p className="">{acc.name}</p><span className="text-[9px] bg-gray-50 px-2.5 py-1 rounded-full uppercase tracking-widest">{acc.location}</span></div><p className="text-[10px] text-gray-300 font-black mt-1 uppercase tracking-widest">{acc.currency}</p></div></div>
                                            <div className="text-right flex flex-col items-end gap-2"><p className="text-2xl font-mono font-black">${formatMoney(acc.balance)}</p><button onClick={() => setShowUpdateModal({ type: 'acc', item: acc })} className="bg-[#FAF9F6] text-[#8EAC8D] p-2 px-4 rounded-2xl text-[10px] font-black uppercase flex items-center gap-1 hover:border-[#CEE5D0] border border-transparent active:scale-90 transition-all tracking-widest"><Icon name="RefreshCw" size={12} /></button></div>
                                            <button onClick={() => { if(confirm('刪除帳戶？')) setAccounts(accounts.filter(a => a.id !== acc.id)); }} className="absolute -left-2 -top-2 opacity-0 group-hover:opacity-100 p-2 bg-white rounded-full text-rose-300 shadow-md active:scale-90 transition-all"><Icon name="Trash2" size={12}/></button>
                                        </div>
                                    ))}</div>
                                </section>
                                <section>
                                    <div className="flex justify-between items-center mb-6 px-4 font-black"><h3 className="text-xl">投資與基金</h3><button onClick={() => setShowInvestModal(true)} className="text-[#5F7A61] text-[10px] bg-white px-5 py-2.5 rounded-full shadow-sm border border-[#F3F0D7] active:scale-95 transition-all flex items-center gap-1 uppercase tracking-widest"><Icon name="Plus" size={14} /> 新增投資</button></div>
                                    <div className="grid grid-cols-1 gap-6">{investments.map(inv => {
                                        const isHist = viewHistoryId === inv.id; const diff = inv.currentVal - (inv.lastVal || inv.currentVal);
                                        return (
                                            <div key={inv.id} className="bg-[#F3F0D7]/40 rounded-[3.5rem] border border-[#F3F0D7] shadow-sm overflow-hidden group relative transition-all">
                                                <div className="p-8 flex items-center justify-between">
                                                    <div className="flex items-center gap-5"><div className="bg-white p-5 rounded-[1.75rem] shadow-sm text-[#A39E82]"><Icon name="Briefcase" strokeWidth={2.5}/></div><div><p className="font-black text-lg">{inv.name}</p><p className="text-[10px] text-[#A39E82] font-black mt-1 uppercase tracking-widest">{inv.currency} {diff !== 0 && <span className={diff > 0 ? 'text-emerald-500' : 'text-rose-500'}>({diff > 0 ? '+' : ''}{formatMoney(diff)})</span>}</p></div></div>
                                                    <div className="text-right flex flex-col items-end gap-3"><p className="text-2xl font-mono font-black">${formatMoney(inv.currentVal)}</p><div className="flex gap-2">
                                                        <button onClick={() => setViewHistoryId(isHist ? null : inv.id)} className={`p-3 rounded-2xl transition-all shadow-sm active:scale-90 ${isHist ? 'bg-[#4A6361] text-white' : 'bg-white/80 text-[#A39E82]'}`}><Icon name="Clock" size={16}/></button>
                                                        <button onClick={() => setShowUpdateModal({ type: 'inv', item: inv })} className="bg-white/80 text-[#A39E82] p-3 px-5 rounded-2xl text-[10px] font-black uppercase flex items-center gap-2 border border-white/50 active:scale-90 transition-all"><Icon name="RefreshCw" size={14}/></button>
                                                    </div></div>
                                                </div>
                                                {isHist && (<div className="px-8 pb-8 animate-in slide-in-from-top-4"><div className="bg-white/60 rounded-[2.5rem] p-7 space-y-4 border border-white/50"><p className="text-[11px] font-black text-[#A39E82] uppercase tracking-[0.3em] mb-4 flex items-center gap-2 opacity-60"><Icon name="Clock" size={12}/> 變動紀錄</p>{inv.history?.map((h, i) => (<div key={i} className="flex justify-between items-center border-b border-[#F3F0D7]/80 pb-3 last:border-0 last:pb-0"><span className="text-[10px] font-black tracking-widest">{h.date}</span><div className="text-right"><p className="text-sm font-black">${formatMoney(h.amount)}</p><span className={`text-[9px] font-black ${h.diff > 0 ? 'text-emerald-500' : 'text-rose-400'}`}>{h.diff > 0 ? '+' : ''}{formatMoney(h.diff)} ({h.percent}%)</span></div></div>))}</div></div>)}
                                                <button onClick={() => { if(confirm('刪除投資項目？')) setInvestments(investments.filter(i => i.id !== inv.id)); }} className="absolute -left-2 -top-2 p-2 bg-white rounded-full text-[#A39E82] shadow-md border border-[#F3F0D7] opacity-0 group-hover:opacity-100 active:scale-90 transition-all"><Icon name="Trash2" size={12}/></button>
                                            </div>
                                        );
                                    })}</div>
                                </section>
                            </div>
                        )}

                        {activeTab === 'archive' && (
                            <div className="space-y-6 pb-12 animate-in fade-in">
                                <div className="flex items-center justify-between px-2 font-black"><h3 className="text-xl">歷史帳本存檔</h3><button onClick={() => { setActiveTab('dashboard'); }} className="p-3 bg-white rounded-full text-[#BCC1B1] shadow-sm active:scale-90 transition-all"><Icon name="X" size={20}/></button></div>
                                <div className="flex gap-3 overflow-x-auto pb-4 scrollbar-hide px-1">
                                    {availableMonths.map(m => (<button key={m} onClick={() => setSelectedArchiveMonth(m)} className={`px-8 py-4 rounded-[1.75rem] text-[11px] font-black whitespace-nowrap transition-all uppercase tracking-[0.2em] ${ (selectedArchiveMonth || currentYearMonth) === m ? 'bg-[#4A6361] text-[#CEE5D0] shadow-xl' : 'bg-white text-[#BCC1B1] border border-[#FAF9F6]'}`}>{m}</button>))}
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white p-6 rounded-[2.5rem] border border-[#F3F0D7] shadow-sm"><p className="text-[9px] font-black text-[#BCC1B1] uppercase tracking-widest mb-1">月支出總計</p><p className="text-xl font-black">${formatMoney(getMonthlyData(selectedArchiveMonth || currentYearMonth).totalSpentUSD)}</p></div>
                                    <div className="bg-white p-6 rounded-[2.5rem] border border-[#F3F0D7] shadow-sm"><p className="text-[9px] font-black text-[#BCC1B1] uppercase tracking-widest mb-1">日常支出筆數</p><p className="text-xl font-black">{getMonthlyData(selectedArchiveMonth || currentYearMonth).monthlyTxs.filter(t => t.type !== 'travel').length} <span className="text-[10px] opacity-40">筆</span></p></div>
                                </div>
                                <div className="bg-white p-10 rounded-[3.5rem] shadow-sm border border-[#F3F0D7]"><div className="space-y-6">
                                    {transactions.filter(t => t.month === (selectedArchiveMonth || currentYearMonth)).length === 0 ? <p className="text-center py-24 text-[11px] font-black text-gray-200 uppercase italic tracking-widest text-center">沒有浪花的聲音</p> : 
                                    transactions.filter(t => t.month === (selectedArchiveMonth || currentYearMonth)).map(t => (<div key={t.id} className="group relative bg-[#FAF9F6]/80 rounded-[2.5rem] p-7 border border-transparent hover:border-[#CEE5D0] transition-all"><div className="flex items-center justify-between"><div className="flex items-center gap-5"><div className={`w-3.5 h-3.5 rounded-full ${t.type === 'need' ? 'bg-[#CEE5D0]' : 'bg-[#F3F0D7]'}`}></div><div><p className="font-black text-sm">{t.title}</p><p className="text-[10px] text-[#BCC1B1] font-black uppercase mt-1 tracking-widest">{t.category}</p></div></div><div className="text-right"><p className="text-base font-black">${formatMoney(t.amount)}</p><p className="text-[9px] text-[#BCC1B1] font-bold tracking-tighter uppercase">{t.date}</p></div></div><div className="absolute right-6 top-1/2 -translate-y-1/2 flex gap-3 opacity-0 group-hover:opacity-100 transition-all"><button onClick={() => { setEditingTx(t); setActiveTab('record'); }} className="p-2.5 bg-white rounded-full text-sky-400 shadow-md active:scale-90"><Icon name="Edit2" size={14}/></button><button onClick={() => { if(confirm('從本本中刪除？')) setTransactions(transactions.filter(i => i.id !== t.id)); }} className="p-2.5 bg-white rounded-full text-rose-300 shadow-md active:scale-90"><Icon name="Trash2" size={14}/></button></div></div>))}
                                </div></div>
                            </div>
                        )}
                    </main>

                    {/* --- Bottom Nav --- */}
                    <div className="fixed bottom-10 left-10 right-10 z-[500]">
                        <nav className="bg-white/80 backdrop-blur-3xl border border-white shadow-[0_25px_60px_rgba(74,99,97,0.15)] rounded-[4rem] p-3.5 flex justify-around items-center">
                            <button onClick={() => { setActiveTab('dashboard'); setSelectedTripId(null); setEditingTx(null); }} className={`p-4 rounded-[2rem] transition-all duration-300 ${activeTab === 'dashboard' ? 'bg-[#4A6361] text-[#CEE5D0] shadow-2xl scale-125 -translate-y-1' : 'text-[#BCC1B1] hover:text-[#8EAC8D]'}`}><Icon name="LayoutDashboard" size={24} strokeWidth={activeTab === 'dashboard' ? 3 : 2}/></button>
                            <button onClick={() => { setActiveTab('record'); setSelectedTripId(null); setEditingTx(null); }} className={`p-4 rounded-[2rem] transition-all duration-300 ${activeTab === 'record' ? 'bg-[#4A6361] text-[#CEE5D0] shadow-2xl scale-125 -translate-y-1' : 'text-[#BCC1B1] hover:text-[#8EAC8D]'}`}><Icon name="Receipt" size={24} strokeWidth={activeTab === 'record' ? 3 : 2}/></button>
                            <button onClick={() => { setActiveTab('passport'); setSelectedTripId(null); setEditingTx(null); }} className={`p-4 rounded-[2rem] transition-all duration-300 ${activeTab === 'passport' ? 'bg-[#4A6361] text-[#CEE5D0] shadow-2xl scale-125 -translate-y-1' : 'text-[#BCC1B1] hover:text-[#8EAC8D]'}`}><Icon name="Plane" size={24} strokeWidth={activeTab === 'passport' ? 3 : 2}/></button>
                            <button onClick={() => { setActiveTab('goals'); setSelectedTripId(null); setEditingTx(null); }} className={`p-4 rounded-[2rem] transition-all duration-300 ${activeTab === 'goals' ? 'bg-[#4A6361] text-[#CEE5D0] shadow-2xl scale-125 -translate-y-1' : 'text-[#BCC1B1] hover:text-[#8EAC8D]'}`}><Icon name="Wallet" size={24} strokeWidth={activeTab === 'goals' ? 3 : 2}/></button>
                        </nav>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
