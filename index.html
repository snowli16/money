<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記帳本本 - Coastal Girl Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FAF9F6;
            color: #4A6361;
            margin: 0;
            padding: 0;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .pastel-gradient {
            background: linear-gradient(135deg, #CEE5D0 0%, #E0F2FE 100%);
        }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 避免圖標閃爍 */
        .lucide { display: inline-block; vertical-align: middle; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        // --- Gemini API 配置 ---
        const apiKey = ""; 

        // --- 修復後的 Lucide Icon 組件 (使用官方創立方式) ---
        const Icon = ({ name, size = 24, strokeWidth = 2, className = "" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    // 使用官方 createIcons 方法替換含有 data-lucide 屬性的元素
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        attrs: {
                            'stroke-width': strokeWidth,
                            width: size,
                            height: size,
                            class: `lucide lucide-${name.toLowerCase()} ${className}`
                        }
                    });
                }
            }, [name, size, strokeWidth, className]);
            
            // 渲染一個帶有 data-lucide 的標籤供 Lucide 腳本識別
            return <i ref={iconRef} data-lucide={name} className="not-italic flex items-center justify-center" />;
        };

        const App = () => {
            // --- 常數設定 ---
            const EXCHANGE_RATE = 31;
            const now = new Date();
            const currentYearMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            const todayStr = now.toISOString().split('T')[0];

            // --- 狀態管理 ---
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedArchiveMonth, setSelectedArchiveMonth] = useState(null);
            
            // 彈窗與 AI 狀態
            const [showAccountModal, setShowAccountModal] = useState(false);
            const [showInvestModal, setShowInvestModal] = useState(false);
            const [showUpdateModal, setShowUpdateModal] = useState(null);
            const [showBudgetModal, setShowBudgetModal] = useState(false);
            const [viewHistoryId, setViewHistoryId] = useState(null);
            const [aiInsight, setAiInsight] = useState("");
            const [isAiLoading, setIsAiLoading] = useState(false);

            // 數據存儲
            const [transactions, setTransactions] = useState([]);
            const [accounts, setAccounts] = useState([
                { id: 'default-acc', name: '主要帳戶', balance: 0, currency: 'USD', location: '美國', lastBalance: 0 }
            ]);
            const [investments, setInvestments] = useState([]);
            const [assetHistory, setAssetHistory] = useState([]);
            const [editingTx, setEditingTx] = useState(null);

            // 預算設定
            const [budgets, setBudgets] = useState({
                '餐飲': 800, '居住': 1500, '交通': 200, '娛樂': 400, '個人': 200,
            });

            const [houseGoal, setHouseGoal] = useState({
                target: 200000, 
                deadline: `${now.getFullYear() + 10}-12-31`, 
            });

            // --- Gemini API 邏輯 ---
            const callGemini = async (prompt, systemPrompt) => {
                setIsAiLoading(true);
                let retryCount = 0;
                const maxRetries = 5;
                
                const fetchWithRetry = async (delay) => {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] }
                            })
                        });
                        
                        if (!response.ok) throw new Error('API Error');
                        const result = await response.json();
                        return result.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (error) {
                        if (retryCount < maxRetries) {
                            retryCount++;
                            await new Promise(res => setTimeout(res, delay));
                            return fetchWithRetry(delay * 2);
                        }
                        throw error;
                    }
                };

                try {
                    const text = await fetchWithRetry(1000);
                    setAiInsight(text);
                } catch (err) {
                    setAiInsight("AI 連線失敗，請檢查網路或 API 設定。");
                } finally {
                    setIsAiLoading(false);
                }
            };

            // --- 計算邏輯 ---
            const toUSD = (amount, currency) => currency === 'TWD' ? amount / EXCHANGE_RATE : amount;

            const netWorthUSD = useMemo(() => {
                const accTotal = accounts.reduce((sum, acc) => sum + (acc.currency === 'TWD' ? acc.balance / EXCHANGE_RATE : acc.balance), 0);
                const investTotal = investments.reduce((sum, inv) => sum + (inv.currency === 'TWD' ? inv.currentVal / EXCHANGE_RATE : inv.currentVal), 0);
                return accTotal + investTotal;
            }, [accounts, investments]);

            const getMonthlyData = (monthStr) => {
                const monthlyTxs = transactions.filter(t => t.month === monthStr);
                const totalSpentUSD = monthlyTxs.reduce((sum, t) => sum + (t.type !== 'travel' ? toUSD(t.amount, t.currency) : 0), 0);
                const needTotal = monthlyTxs.filter(t => t.type === 'need').reduce((sum, t) => sum + toUSD(t.amount, t.currency), 0);
                const wantTotal = monthlyTxs.filter(t => t.type === 'want').reduce((sum, t) => sum + toUSD(t.amount, t.currency), 0);
                
                const catStats = {};
                monthlyTxs.filter(t => t.type !== 'travel').forEach(t => {
                    catStats[t.category] = (catStats[t.category] || 0) + toUSD(t.amount, t.currency);
                });
                return { monthlyTxs, totalSpentUSD, catStats, needTotal, wantTotal };
            };

            const { totalSpentUSD: currentTotalSpentUSD, catStats: currentCatStats, needTotal, wantTotal } = getMonthlyData(currentYearMonth);

            const availableMonths = useMemo(() => {
                const months = [...new Set([currentYearMonth, ...transactions.map(t => t.month)])];
                return months.sort().reverse();
            }, [transactions, currentYearMonth]);

            // --- 處理功能 ---
            const handleUpdateValue = (newVal) => {
                const { type, item } = showUpdateModal;
                const valueNum = Number(newVal);
                let updatedAccs = [...accounts]; 
                let updatedInvs = [...investments];

                if (type === 'acc') {
                    updatedAccs = accounts.map(acc => acc.id === item.id ? { ...acc, lastBalance: acc.balance, balance: valueNum } : acc);
                    setAccounts(updatedAccs);
                } else {
                    updatedInvs = investments.map(inv => {
                        if (inv.id === item.id) {
                            const lastValue = inv.currentVal;
                            const diff = valueNum - lastValue;
                            const percent = lastValue !== 0 ? ((valueNum / lastValue - 1) * 100).toFixed(1) : 0;
                            return { ...inv, lastVal: lastValue, currentVal: valueNum, history: [{ date: todayStr, amount: valueNum, diff, percent: Number(percent) }, ...(inv.history || [])] };
                        }
                        return inv;
                    });
                    setInvestments(updatedInvs);
                }
                
                // 記錄趨勢圖數據
                const curUSD = updatedAccs.filter(a => a.currency === 'USD').reduce((s, a) => s + a.balance, 0) + updatedInvs.filter(i => i.currency === 'USD').reduce((s, i) => s + i.currentVal, 0);
                const curTWD = updatedAccs.filter(a => a.currency === 'TWD').reduce((s, a) => s + a.balance, 0) + updatedInvs.filter(i => i.currency === 'TWD').reduce((s, i) => s + i.currentVal, 0);
                
                const newHistory = [...assetHistory];
                const existingIdx = newHistory.findIndex(h => h.date === currentYearMonth);
                if (existingIdx >= 0) { newHistory[existingIdx] = { date: currentYearMonth, usd: curUSD, twd: curTWD }; }
                else { newHistory.push({ date: currentYearMonth, usd: curUSD, twd: curTWD }); }
                setAssetHistory(newHistory);
                setShowUpdateModal(null);
            };

            const handleAIInsight = () => {
                const categoriesStr = Object.entries(currentCatStats).map(([k, v]) => `${k}: $${v}`).join(', ');
                const systemPrompt = "妳是一位溫柔的海濱理財助手。請用繁體中文給予鼓勵且實用的建議。";
                const prompt = `本月支出 $${currentTotalSpentUSD.toFixed(1)} USD。必要佔 ${currentTotalSpentUSD > 0 ? ((needTotal/(needTotal+wantTotal))*100).toFixed(0) : 0}%，想要佔 ${currentTotalSpentUSD > 0 ? ((wantTotal/(needTotal+wantTotal))*100).toFixed(0) : 0}%。請給我三個簡短的理財建議。`;
                callGemini(prompt, systemPrompt);
            };

            // --- 趨勢圖組件 ---
            const DualTrendChart = ({ data }) => {
                if (data.length < 2) return <div className="h-32 flex flex-col items-center justify-center text-[10px] text-gray-300 bg-gray-50/50 rounded-[2rem] border border-dashed border-gray-200 mt-4"><Icon name="TrendingUp" size={20} className="mb-2 opacity-30" />更新數據以開啟趨勢圖</div>;
                const maxVal = Math.max(...data.map(d => Math.max(d.usd, d.twd / EXCHANGE_RATE))) * 1.1 || 100;
                const width = 300; const height = 100;
                const getPoints = (key, factor = 1) => data.map((d, i) => ({ x: (i / (data.length - 1)) * width, y: height - ((d[key] / factor) / maxVal) * height }));
                const uPts = getPoints('usd'); const tPts = getPoints('twd', EXCHANGE_RATE);
                const path = (pts) => `M ${pts.map(p => `${p.x},${p.y}`).join(' L ')}`;
                return (
                    <div className="w-full mt-6 px-2">
                        <div className="flex gap-4 mb-4">
                            <div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full bg-sky-400"></div><span className="text-[10px] font-black uppercase">USD</span></div>
                            <div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full bg-emerald-400"></div><span className="text-[10px] font-black uppercase">TWD</span></div>
                        </div>
                        <div className="h-32 relative"><svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full overflow-visible"><path d={path(uPts)} fill="none" stroke="#38BDF8" strokeWidth="3" strokeLinecap="round" /><path d={path(tPts)} fill="none" stroke="#10B981" strokeWidth="3" strokeLinecap="round" /></svg></div>
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-[#FAF9F6] pb-36 font-sans text-[#4A6361] overflow-x-hidden selection:bg-[#CEE5D0]">
                    
                    {/* 彈窗系統 */}
                    {showBudgetModal && (
                        <div className="fixed inset-0 z-[1000] flex items-center justify-center p-6 bg-[#4A6361]/40 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl border border-[#CEE5D0]">
                                <div className="flex justify-between items-center mb-6"><h3 className="font-black text-xl">預算設定 (USD)</h3><button onClick={() => setShowBudgetModal(false)}><Icon name="X" /></button></div>
                                <div className="space-y-4 max-h-[50vh] overflow-y-auto pr-2 scrollbar-hide">
                                    {Object.entries(budgets).map(([cat, limit]) => (
                                        <div key={cat} className="space-y-1">
                                            <label className="text-[10px] font-black text-gray-400 ml-2 uppercase tracking-widest">{cat}</label>
                                            <input type="number" className="w-full p-4 rounded-2xl bg-[#FAF9F6] outline-none font-bold" defaultValue={limit} onBlur={(e) => setBudgets({...budgets, [cat]: Number(e.target.value)})} />
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setShowBudgetModal(false)} className="w-full bg-[#8EAC8D] text-white p-5 rounded-2xl font-black mt-6 shadow-lg shadow-[#CEE5D0]/30 transition-all active:scale-95">確認完成</button>
                            </div>
                        </div>
                    )}

                    {showUpdateModal && (
                        <div className="fixed inset-0 z-[1100] flex items-center justify-center p-6 bg-[#4A6361]/70 backdrop-blur-md animate-in zoom-in-95">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl text-center border border-[#CEE5D0]">
                                <h3 className="font-black text-xl mb-2">更新現值</h3>
                                <p className="text-[10px] text-gray-400 mb-6 font-black uppercase tracking-widest">{showUpdateModal.item.name}</p>
                                <input type="number" id="upd-val" autoFocus className="w-full p-6 rounded-2xl bg-[#FAF9F6] border-2 border-[#CEE5D0] text-3xl font-black text-center mb-6 outline-none text-[#4A6361]" defaultValue={showUpdateModal.item.balance ?? showUpdateModal.item.currentVal} />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowUpdateModal(null)} className="flex-1 p-5 rounded-2xl font-bold bg-gray-50 text-gray-400">取消</button>
                                    <button onClick={() => handleUpdateValue(document.getElementById('upd-val').value)} className="flex-[2] p-5 rounded-2xl font-black bg-[#8EAC8D] text-white shadow-xl shadow-[#CEE5D0]/30 transition-all active:scale-95">更新存檔</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showAccountModal && (
                        <div className="fixed inset-0 z-[1000] flex items-center justify-center p-6 bg-[#4A6361]/40 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl border border-[#CEE5D0]">
                                <div className="flex justify-between items-center mb-6 text-[#4A6361]"><h3 className="font-black text-xl">新增帳戶</h3><button onClick={() => setShowAccountModal(false)}><Icon name="X"/></button></div>
                                <div className="space-y-4">
                                    <input placeholder="帳戶名稱 (如 Chase)" className="w-full p-4 rounded-2xl bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0]" id="an" />
                                    <input type="number" placeholder="初始餘額" className="w-full p-4 rounded-2xl bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0]" id="ab" />
                                    <div className="flex gap-2">
                                        <select className="flex-1 p-4 rounded-2xl bg-[#FAF9F6] text-sm font-bold" id="ac"><option value="USD">USD 美金</option><option value="TWD">TWD 台幣</option></select>
                                        <select className="flex-1 p-4 rounded-2xl bg-[#FAF9F6] text-sm font-bold" id="al"><option value="美國">美國</option><option value="台灣">台灣</option></select>
                                    </div>
                                    <button onClick={() => {
                                        const n = document.getElementById('an').value; const b = document.getElementById('ab').value;
                                        const c = document.getElementById('ac').value; const l = document.getElementById('al').value;
                                        if(n && b) { setAccounts([...accounts, { id: Date.now(), name: n, balance: Number(b), currency: c, location: l, lastBalance: Number(b) }]); setShowAccountModal(false); }
                                    }} className="w-full bg-[#8EAC8D] text-white p-5 rounded-2xl font-black shadow-lg">儲存帳戶</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showInvestModal && (
                        <div className="fixed inset-0 z-[1000] flex items-center justify-center p-6 bg-[#4A6361]/40 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl border border-[#CEE5D0]">
                                <div className="flex justify-between items-center mb-6 text-[#4A6361]"><h3 className="font-black text-xl">新增投資</h3><button onClick={() => setShowInvestModal(false)}><Icon name="X"/></button></div>
                                <div className="space-y-4">
                                    <input placeholder="資產名稱" className="w-full p-4 rounded-2xl bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0]" id="in" />
                                    <input type="number" placeholder="目前價值" className="w-full p-4 rounded-2xl bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0]" id="iv" />
                                    <select className="w-full p-4 rounded-2xl bg-[#FAF9F6] text-sm font-bold" id="ic"><option value="USD">USD 美金</option><option value="TWD">TWD 台幣</option></select>
                                    <button onClick={() => {
                                        const n = document.getElementById('in').value; const v = document.getElementById('iv').value; const c = document.getElementById('ic').value;
                                        if(n && v) { setInvestments([...investments, { id: Date.now(), name: n, currentVal: Number(v), currency: c, lastVal: Number(v), history: [{date: todayStr, amount: Number(v), diff: 0, percent: 0}] }]); setShowInvestModal(false); }
                                    }} className="w-full bg-[#4A6361] text-white p-5 rounded-2xl font-black shadow-lg">儲存投資</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className="p-12 pb-8 flex justify-between items-center">
                        <div><h1 className="text-4xl font-black tracking-tighter italic text-[#4A6361]">記帳<span className="text-sky-400 not-italic">本本</span></h1></div>
                        <button onClick={() => { setActiveTab('archive'); setAiInsight(""); }} className={`w-15 h-15 rounded-[2.5rem] flex items-center justify-center border transition-all ${activeTab === 'archive' ? 'bg-[#4A6361] text-[#CEE5D0] shadow-xl' : 'bg-white text-[#8EAC8D] border-[#CEE5D0] shadow-sm'}`}><Icon name="History" size={28} /></button>
                    </header>

                    {/* Main Content */}
                    <main className="px-7 space-y-6">
                        
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 fade-in">
                                {/* AI Insight */}
                                <div className="pastel-gradient p-8 rounded-[3rem] shadow-xl border border-white/50 relative overflow-hidden group">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-xs font-black text-[#4A6361] uppercase tracking-[0.2em] flex items-center gap-2">✨ ✨ AI 理財分析</h3>
                                        {isAiLoading && <Icon name="Loader2" size={16} className="animate-spin text-[#8EAC8D]"/>}
                                    </div>
                                    {aiInsight ? (
                                        <div className="animate-in fade-in">
                                            <p className="text-sm font-bold text-[#4A6361]/80 leading-relaxed italic">"{aiInsight}"</p>
                                            <button onClick={() => setAiInsight("")} className="mt-4 text-[9px] font-black uppercase text-[#8EAC8D] underline tracking-widest">關閉建議</button>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col gap-3">
                                            <p className="text-[10px] font-medium text-[#5F7A61]">想聽聽這個月花費的分配建議嗎？</p>
                                            <button onClick={handleAIInsight} disabled={isAiLoading} className="w-full bg-white/60 backdrop-blur-md text-[#4A6361] p-3.5 rounded-2xl font-black text-[11px] shadow-sm flex items-center justify-center gap-2 hover:bg-white transition-all">✨ ✨ 獲取 AI 理財建議</button>
                                        </div>
                                    )}
                                </div>

                                {/* Consumption Structure */}
                                <div className="bg-white p-8 rounded-[3.5rem] border border-[#F3F0D7] shadow-sm">
                                    <div className="flex justify-between items-center mb-5"><h3 className="text-xs font-black text-[#4A6361] uppercase tracking-[0.2em] flex items-center gap-2"><Icon name="PieChart" size={14} className="text-[#8EAC8D]"/> 消費結構分析</h3></div>
                                    <div className="flex gap-1.5 h-4 rounded-full overflow-hidden bg-gray-50 border border-gray-100/50">
                                        <div className="bg-[#8EAC8D] h-full transition-all duration-1000" style={{ width: `${currentTotalSpentUSD > 0 ? (needTotal / (needTotal + wantTotal)) * 100 : 0}%` }} />
                                        <div className="bg-[#F3F0D7] h-full transition-all duration-1000" style={{ width: `${currentTotalSpentUSD > 0 ? (wantTotal / (needTotal + wantTotal)) * 100 : 0}%` }} />
                                    </div>
                                    <div className="flex justify-between mt-5 text-[10px] font-black uppercase tracking-widest">
                                        <div className="flex items-center gap-2 text-[#5F7A61]"><div className="w-2.5 h-2.5 rounded-full bg-[#8EAC8D]"></div>必要 Need {currentTotalSpentUSD > 0 ? ((needTotal / (needTotal + wantTotal)) * 100).toFixed(0) : 0}%</div>
                                        <div className="flex items-center gap-2 text-[#A39E82]">想要 Want {currentTotalSpentUSD > 0 ? ((wantTotal / (needTotal + wantTotal)) * 100).toFixed(0) : 0}%<div className="w-2.5 h-2.5 rounded-full bg-[#F3F0D7]"></div></div>
                                    </div>
                                </div>

                                <div className="bg-[#CEE5D0] p-9 rounded-[3.5rem] text-[#4A6361] shadow-2xl border border-[#B8D4BB]">
                                    <p className="opacity-80 text-[10px] font-black uppercase tracking-widest">本月總開銷 (USD)</p>
                                    <h2 className="text-4xl font-black mt-3">${Math.round(currentTotalSpentUSD).toLocaleString()}</h2>
                                    <div className="mt-8 bg-white/30 h-4.5 rounded-full overflow-hidden backdrop-blur-sm">
                                        <div className="bg-[#8EAC8D] h-full transition-all" style={{ width: `${Math.min((currentTotalSpentUSD / (Object.values(budgets).reduce((s,v)=>s+v,0))) * 100, 100)}%` }} />
                                    </div>
                                    <div className="flex justify-between mt-4 text-[10px] font-black uppercase tracking-widest text-[#5F7A61]"><span>支出進度</span><span>總預算 ${Object.values(budgets).reduce((s,v)=>s+v,0).toLocaleString()}</span></div>
                                </div>

                                <section className="px-1 pb-10">
                                    <div className="flex justify-between items-center mb-6"><h3 className="text-lg font-black flex items-center gap-2 text-[#4A6361]"><Icon name="Activity" size={18} className="text-[#8EAC8D]" /> 預算管理 (Budget)</h3><button onClick={() => setShowBudgetModal(true)} className="p-2.5 bg-white rounded-2xl shadow-sm border border-[#F3F0D7] text-[#8EAC8D] active:scale-90 transition-all"><Icon name="Settings2" size={16}/></button></div>
                                    <div className="grid grid-cols-1 gap-4">
                                        {Object.entries(budgets).map(([cat, limit]) => {
                                            const spent = currentCatStats[cat] || 0; const percent = (spent / limit) * 100;
                                            return (
                                                <div key={cat} className="bg-white p-7 rounded-[2.5rem] border border-[#F3F0D7] flex items-center justify-between shadow-sm hover:scale-[1.02] transition-all">
                                                    <div><p className="font-black text-[#4A6361]">{cat}</p><span className={`text-[9px] font-black uppercase tracking-widest ${percent > 100 ? 'text-rose-400' : 'text-[#A39E82]'}`}>{percent > 100 ? '⚠️ 已透支' : `消耗 ${percent.toFixed(0)}%`}</span></div>
                                                    <div className="text-right"><p className="font-mono font-black text-xl text-[#8EAC8D]">${Math.round(spent)}</p><p className="text-[9px] text-gray-300 font-bold uppercase tracking-tighter">MAX ${limit}</p></div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </section>
                            </div>
                        )}

                        {activeTab === 'record' && (
                            <div className="fade-in">
                                <div className="bg-white p-10 rounded-[3.5rem] shadow-sm border border-[#CEE5D0]">
                                    <div className="flex justify-between items-center mb-10"><h3 className="font-black text-2xl tracking-tight">{editingTx ? '修改紀錄' : '新增支出'}</h3><div className="bg-[#F8F9F4] px-5 py-2.5 rounded-2xl border border-[#CEE5D0]"><span className="text-[10px] font-black text-[#8EAC8D]">USD 基準</span></div></div>
                                    <div className="space-y-8">
                                        <div className="space-y-2"><label className="text-[10px] font-black text-gray-300 uppercase tracking-widest ml-3">項目名稱</label><input placeholder="例如：美妝保養、晚餐..." className="w-full p-6 rounded-[2.2rem] bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0] transition-all" id="tn" defaultValue={editingTx?.title || ''} /></div>
                                        <div className="space-y-2"><label className="text-[10px] font-black text-gray-300 uppercase tracking-widest ml-3">花費金額</label><div className="relative"><input type="number" placeholder="0.00" className="w-full p-6 rounded-[2.2rem] bg-[#FAF9F6] outline-none text-sm font-bold border-2 border-transparent focus:border-[#CEE5D0] transition-all" id="ta" defaultValue={editingTx?.amount || ''} /><span className="absolute right-8 top-1/2 -translate-y-1/2 font-black text-[#CEE5D0] text-xs">USD</span></div></div>
                                        <div className="flex gap-4">
                                            <div className="flex-1 space-y-2"><label className="text-[10px] font-black text-gray-300 ml-3 uppercase tracking-widest">類別</label><select className="w-full p-6 rounded-[2.2rem] bg-[#FAF9F6] text-sm font-bold outline-none border-2 border-transparent focus:border-[#CEE5D0]" id="tc" defaultValue={editingTx?.category || '餐飲'}>{Object.keys(budgets).map(c => <option key={c}>{c}</option>)}<option value="旅遊">旅遊</option></select></div>
                                            <div className="flex-1 space-y-2"><label className="text-[10px] font-black text-gray-300 ml-3 uppercase tracking-widest">性質</label><select className="w-full p-6 rounded-[2.2rem] bg-[#FAF9F6] text-sm font-bold outline-none border-2 border-transparent focus:border-[#CEE5D0]" id="ty" defaultValue={editingTx?.type || 'need'}><option value="need">必要 🌿</option><option value="want">想要 ✨</option><option value="travel">大項 🌊</option></select></div>
                                        </div>
                                        <button onClick={() => {
                                            const n = document.getElementById('tn').value; const a = document.getElementById('ta').value;
                                            const c = document.getElementById('tc').value; const y = document.getElementById('ty').value;
                                            if(n && a) {
                                                if(editingTx) { setTransactions(transactions.map(i => i.id === editingTx.id ? {...i, title:n, amount:Number(a), category:c, type:y} : i)); setEditingTx(null); }
                                                else { setTransactions([{ id: Date.now(), title: n, amount: Number(a), category: c, type: y, currency: 'USD', month: currentYearMonth, date: todayStr }, ...transactions]); }
                                                setActiveTab('dashboard');
                                            }
                                        }} className="w-full bg-[#8EAC8D] text-white p-7 rounded-[2.5rem] font-black shadow-2xl active:scale-95 text-lg tracking-widest transition-all">儲存到本本</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'goals' && (
                            <div className="space-y-8 pb-12 fade-in">
                                <section className="bg-white p-10 rounded-[3.5rem] border border-[#CEE5D0] shadow-sm overflow-hidden">
                                    <div className="flex justify-between items-center mb-6"><div className="flex items-center gap-2 text-[#4A6361] font-black text-sm uppercase tracking-widest"><Icon name="TrendingUp" size={16} strokeWidth={3} /> 資產趨勢 (雙線追蹤)</div></div>
                                    <DualTrendChart data={assetHistory} />
                                </section>

                                <section>
                                    <div className="flex justify-between items-center mb-6 px-4"><h3 className="font-black text-xl">資產帳戶</h3><button onClick={() => setShowAccountModal(true)} className="text-[#8EAC8D] text-[10px] font-black bg-white px-5 py-2.5 rounded-full shadow-sm border border-[#CEE5D0] active:scale-95 flex items-center gap-1 uppercase tracking-widest"><Icon name="Plus" size={14} /> 新增帳戶</button></div>
                                    <div className="grid grid-cols-1 gap-5">{accounts.map(acc => (
                                        <div key={acc.id} className="bg-white p-8 rounded-[3rem] border border-[#CEE5D0] flex items-center justify-between shadow-sm relative group overflow-hidden transition-all hover:translate-y-[-2px]">
                                            <div className="flex items-center gap-5"><div className={`p-5 rounded-[1.5rem] ${acc.currency === 'USD' ? 'bg-sky-50 text-sky-400' : 'bg-emerald-50 text-emerald-400'}`}><Icon name="DollarSign" strokeWidth={3}/></div><div><div className="flex items-center gap-2"><p className="font-black text-[#4A6361]">{acc.name}</p><span className="text-[9px] bg-gray-50 text-gray-400 px-2.5 py-1 rounded-full font-black uppercase">{acc.location}</span></div><p className="text-[10px] text-gray-300 font-black mt-1 uppercase tracking-widest">{acc.currency}</p></div></div>
                                            <div className="text-right flex flex-col items-end gap-2"><p className="text-2xl font-mono font-black text-[#4A6361]">${acc.balance.toLocaleString()}</p><button onClick={() => setShowUpdateModal({ type: 'acc', item: acc })} className="bg-[#FAF9F6] text-[#8EAC8D] p-2 px-4 rounded-2xl text-[10px] font-black uppercase flex items-center gap-1 hover:border-[#CEE5D0] border border-transparent active:scale-90 transition-all tracking-widest"><Icon name="RefreshCw" size={12} /></button></div>
                                            <button onClick={() => { if(confirm('刪除帳戶？')) setAccounts(accounts.filter(a => a.id !== acc.id)); }} className="absolute -left-2 -top-2 opacity-0 group-hover:opacity-100 p-2 bg-white rounded-full text-rose-300 shadow-md border border-rose-50 transition-all"><Icon name="Trash2" size={12}/></button>
                                        </div>
                                    ))}</div>
                                </section>

                                <section>
                                    <div className="flex justify-between items-center mb-6 px-4"><h3 className="font-black text-xl">投資與基金</h3><button onClick={() => setShowInvestModal(true)} className="text-[#5F7A61] text-[10px] font-black bg-white px-5 py-2.5 rounded-full shadow-sm border border-[#F3F0D7] active:scale-95 flex items-center gap-1 uppercase tracking-widest"><Icon name="Plus" size={14} /> 新增投資</button></div>
                                    <div className="grid grid-cols-1 gap-6">{investments.map(inv => (
                                        <div key={inv.id} className="bg-[#F3F0D7]/40 rounded-[3.5rem] border border-[#F3F0D7] shadow-sm overflow-hidden group relative transition-all">
                                            <div className="p-8 flex items-center justify-between">
                                                <div className="flex items-center gap-5"><div className="bg-white p-5 rounded-[1.75rem] shadow-sm text-[#A39E82]"><Icon name="Briefcase" strokeWidth={2.5}/></div><div><p className="font-black text-[#7A745C] text-lg">{inv.name}</p><p className="text-[10px] text-[#A39E82] font-black mt-1 uppercase tracking-widest">{inv.currency}</p></div></div>
                                                <div className="text-right flex flex-col items-end gap-3"><p className="text-2xl font-mono font-black text-[#7A745C]">${inv.currentVal.toLocaleString()}</p><div className="flex gap-2"><button onClick={() => setViewHistoryId(viewHistoryId === inv.id ? null : inv.id)} className={`p-3 rounded-2xl transition-all shadow-sm ${viewHistoryId === inv.id ? 'bg-[#4A6361] text-white' : 'bg-white/80 text-[#A39E82]'}`}><Icon name="Clock" size={16}/></button><button onClick={() => setShowUpdateModal({ type: 'inv', item: inv })} className="bg-white/80 text-[#A39E82] p-3 px-5 rounded-2xl text-[10px] font-black uppercase flex items-center gap-2 border border-white/50 active:scale-90"><Icon name="RefreshCw" size={14}/></button></div></div>
                                            </div>
                                            {viewHistoryId === inv.id && (
                                                <div className="px-8 pb-8 animate-in slide-in-from-top-4"><div className="bg-white/60 rounded-[2.5rem] p-7 space-y-4 border border-white/50"><p className="text-[11px] font-black text-[#A39E82] uppercase tracking-[0.3em] mb-4 flex items-center gap-2 opacity-60"><Icon name="Clock" size={12}/> 變動紀錄明細</p>{inv.history?.map((h, i) => (<div key={i} className="flex justify-between items-center border-b border-[#F3F0D7]/80 pb-3 last:border-0 last:pb-0"><span className="text-[10px] font-black text-[#A39E82] tracking-widest">{h.date}</span><div className="text-right"><p className="text-sm font-black text-[#7A745C]">${h.amount.toLocaleString()}</p><span className={`text-[9px] font-black ${h.diff > 0 ? 'text-emerald-500' : 'text-rose-400'}`}>{h.diff > 0 ? '+' : ''}{h.diff.toLocaleString()} ({h.percent}%)</span></div></div>))}</div></div>
                                            )}
                                            <button onClick={() => { if(confirm('刪除投資項目？')) setInvestments(investments.filter(i => i.id !== inv.id)); }} className="absolute -left-2 -top-2 p-2 bg-white rounded-full text-[#A39E82] shadow-md border border-[#F3F0D7] active:scale-90 opacity-0 group-hover:opacity-100 transition-all"><Icon name="Trash2" size={12}/></button>
                                        </div>
                                    ))}</div>
                                </section>
                            </div>
                        )}

                        {activeTab === 'archive' && (
                            <div className="space-y-6 pb-12 fade-in">
                                <div className="flex items-center justify-between px-2"><h3 className="font-black text-xl text-[#4A6361]">歷史帳本存檔</h3><button onClick={() => { setActiveTab('dashboard'); setAiInsight(""); }} className="p-3 bg-white rounded-full text-[#BCC1B1] shadow-sm"><Icon name="X" size={20}/></button></div>
                                <div className="flex gap-3 overflow-x-auto pb-4 scrollbar-hide px-1">{availableMonths.map(m => (<button key={m} onClick={() => setSelectedArchiveMonth(m)} className={`px-8 py-4 rounded-[1.75rem] text-[11px] font-black whitespace-nowrap transition-all uppercase tracking-[0.2em] ${ (selectedArchiveMonth || currentYearMonth) === m ? 'bg-[#4A6361] text-[#CEE5D0] shadow-xl' : 'bg-white text-[#BCC1B1] border border-[#FAF9F6]'}`}>{m}</button>))}</div>
                                <div className="bg-white p-10 rounded-[3.5rem] shadow-sm border border-[#F3F0D7]"><div className="space-y-6">{transactions.filter(t => t.month === (selectedArchiveMonth || currentYearMonth)).length === 0 ? <p className="text-center py-24 text-[11px] font-black text-gray-200 uppercase italic tracking-widest">沒有浪花的聲音</p> : transactions.filter(t => t.month === (selectedArchiveMonth || currentYearMonth)).map(t => (<div key={t.id} className="group relative bg-[#FAF9F6]/80 rounded-[2.5rem] p-7 border border-transparent hover:border-[#CEE5D0] transition-all"><div className="flex items-center justify-between"><div className="flex items-center gap-5"><div className={`w-3.5 h-3.5 rounded-full ${t.type === 'need' ? 'bg-[#CEE5D0]' : 'bg-[#F3F0D7]'}`}></div><div><p className="text-sm font-black text-[#4A6361]">{t.title}</p><p className="text-[10px] text-[#BCC1B1] font-black uppercase mt-1 tracking-widest">{t.category}</p></div></div><div className="text-right"><p className="text-base font-black text-[#4A6361]">${t.amount}</p><p className="text-[9px] text-[#BCC1B1] font-bold tracking-tighter uppercase">{t.date}</p></div></div><div className="absolute right-6 top-1/2 -translate-y-1/2 flex gap-3 opacity-0 group-hover:opacity-100 transition-all"><button onClick={() => { setEditingTx(t); setActiveTab('record'); }} className="p-2.5 bg-white rounded-full text-sky-400 shadow-md"><Icon name="Edit2" size={14}/></button><button onClick={() => { if(confirm('確定刪除？')) setTransactions(transactions.filter(i => i.id !== t.id)); }} className="p-2.5 bg-white rounded-full text-rose-300 shadow-md"><Icon name="Trash2" size={14}/></button></div></div>))}</div></div>
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav */}
                    <div className="fixed bottom-10 left-10 right-10 z-[500]">
                        <nav className="bg-white/80 backdrop-blur-3xl border border-white shadow-[0_25px_60px_rgba(74,99,97,0.15)] rounded-[4rem] p-3.5 flex justify-around items-center">
                            <button onClick={() => { setActiveTab('dashboard'); setEditingTx(null); }} className={`p-5 rounded-[2.5rem] transition-all duration-500 ${activeTab === 'dashboard' ? 'bg-[#4A6361] text-[#CEE5D0] shadow-2xl scale-125 -translate-y-1' : 'text-[#BCC1B1] hover:text-[#8EAC8D]'}`}><Icon name="LayoutDashboard" size={24} strokeWidth={activeTab === 'dashboard' ? 3 : 2}/></button>
                            <button onClick={() => { setActiveTab('record'); setEditingTx(null); }} className={`p-5 rounded-[2.5rem] transition-all duration-500 ${activeTab === 'record' ? 'bg-[#4A6361] text-[#CEE5D0] shadow-2xl scale-125 -translate-y-1' : 'text-[#BCC1B1] hover:text-[#8EAC8D]'}`}><Icon name="Receipt" size={24} strokeWidth={activeTab === 'record' ? 3 : 2}/></button>
                            <button onClick={() => { setActiveTab('goals'); setEditingTx(null); }} className={`p-5 rounded-[2.5rem] transition-all duration-500 ${activeTab === 'goals' ? 'bg-[#4A6361] text-[#CEE5D0] shadow-2xl scale-125 -translate-y-1' : 'text-[#BCC1B1] hover:text-[#8EAC8D]'}`}><Icon name="Wallet" size={24} strokeWidth={activeTab === 'goals' ? 3 : 2}/></button>
                        </nav>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
