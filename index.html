<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>存錢記帳</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --bg:        #F7F3EC;
      --surface:   #EFE9DD;
      --border:    #DDD4BE;
      --muted:     #C4B89A;
      --text:      #3D3328;
      --subtext:   #7A6E5F;
      --needs:     #6B7F5E;
      --wants:     #A07850;
      --accent:    #8C7355;
      --danger:    #B85C4A;
      --success:   #5A7A52;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .app-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .month-badge {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--subtext);
      margin-top: 3px;
    }

    .date-display {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      line-height: 1.5;
    }

    /* Main form card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin: 20px 16px 0;
      padding: 24px 20px;
    }

    .card-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
    }

    /* Type toggle */
    .type-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }

    .type-btn {
      padding: 12px 0;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--subtext);
    }

    .type-btn.active-needs {
      background: var(--needs);
      border-color: var(--needs);
      color: white;
      font-weight: 500;
    }

    .type-btn.active-wants {
      background: var(--wants);
      border-color: var(--wants);
      color: white;
      font-weight: 500;
    }

    /* Amount input */
    .amount-row {
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 4px 16px;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    .amount-row:focus-within {
      border-color: var(--accent);
    }

    .currency-symbol {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--muted);
      margin-right: 8px;
    }

    .amount-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--text);
      padding: 10px 0;
      width: 100%;
    }

    .amount-input::placeholder { color: var(--border); }

    /* Select & text inputs */
    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--subtext);
      margin-bottom: 6px;
    }

    .field select,
    .field input[type="text"],
    .field input[type="date"],
    .field textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 300;
      color: var(--text);
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }

    .field select:focus,
    .field input:focus,
    .field textarea:focus {
      border-color: var(--accent);
    }

    .field textarea {
      resize: none;
      height: 72px;
      line-height: 1.5;
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 12px;
    }

    /* Category chips preview */
    .category-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.3px;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .submit-btn:active { transform: scale(0.98); opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: white;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 400;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }

    /* Recent log */
    .log-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin: 14px 16px 0;
      overflow: hidden;
    }

    .log-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
    }

    .log-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .log-item {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .log-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .log-dot.needs { background: var(--needs); }
    .log-dot.wants { background: var(--wants); }

    .log-info { flex: 1; min-width: 0; }

    .log-category {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .log-desc {
      font-size: 12px;
      color: var(--subtext);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .log-amount {
      font-family: 'DM Serif Display', serif;
      font-size: 16px;
      color: var(--text);
      flex-shrink: 0;
    }

    .log-empty {
      padding: 28px 20px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    /* Config reminder */
    .config-banner {
      background: #FFF8ED;
      border: 1px solid #E8D5A8;
      border-radius: 12px;
      margin: 14px 16px 0;
      padding: 14px 16px;
      font-size: 13px;
      color: #7A6020;
      line-height: 1.6;
    }

    .config-banner strong { font-weight: 500; }
    .config-banner code {
      background: rgba(0,0,0,0.06);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <div>
        <div class="app-title">存錢記帳</div>
        <div class="month-badge" id="monthBadge">— —</div>
      </div>
      <div class="date-display" id="dateDisplay">—</div>
    </div>
  </header>

  <!-- Config reminder (shown until SCRIPT_URL is set) -->
  <div class="config-banner" id="configBanner">
    ⚙️ <strong>設定一次就好：</strong>把 Apps Script 部署後的網址貼進這個檔案最底部的 <code>SCRIPT_URL</code> 變數，然後這個提示就會消失。
  </div>

  <!-- Main form -->
  <div class="card">
    <div class="card-label">新增記帳</div>

    <div class="type-toggle">
      <button class="type-btn active-needs" id="btnNeeds" onclick="setType('Needs')">🌿 Needs 必要</button>
      <button class="type-btn" id="btnWants" onclick="setType('Wants')">✨ Wants 想要</button>
    </div>

    <div class="amount-row">
      <span class="currency-symbol">$</span>
      <input class="amount-input" type="number" id="amount" placeholder="0.00" inputmode="decimal" step="0.01" />
    </div>

    <div class="field">
      <label>分類</label>
      <div class="select-wrapper">
        <select id="category">
          <optgroup label="🌿 Needs 必要支出" id="needsGroup">
            <option value="Groceries">Groceries 雜貨餐飲</option>
            <option value="Transportation">Transportation 交通</option>
            <option value="Rent">Rent 房租</option>
            <option value="Insurance">Insurance 保險</option>
            <option value="Daily Essentials">Daily Essentials 生活用品</option>
            <option value="Personal Care">Personal Care 個人保養</option>
            <option value="Subscriptions">Subscriptions 訂閱</option>
            <option value="School">School 學費相關</option>
          </optgroup>
          <optgroup label="✨ Wants 想要支出" id="wantsGroup">
            <option value="Dining Out">Dining Out 外食</option>
            <option value="Entertainment">Entertainment 娛樂</option>
            <option value="Shopping">Shopping 購物</option>
            <option value="Hobbies">Hobbies 興趣</option>
            <option value="Makeup & Beauty">Makeup & Beauty 化妝保養</option>
            <option value="Clothes">Clothes 衣服配件</option>
            <option value="Travel">Travel 旅遊</option>
          </optgroup>
        </select>
      </div>
    </div>

    <div class="field">
      <label>備註（為什麼花這筆？）</label>
      <textarea id="description" placeholder="e.g. 買了一支新粉底，趁sale..."></textarea>
    </div>

    <div class="field">
      <label>日期</label>
      <input type="date" id="date" />
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitEntry()">記帳 →</button>
  </div>

  <!-- Recent entries log -->
  <div class="log-card">
    <div class="log-header">
      <div class="log-title">這次 Session 記錄</div>
    </div>
    <div id="logList">
      <div class="log-empty">還沒有記錄</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ============================================
    // ⚠️ 把你的 Apps Script 部署網址貼在這裡
    // ============================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_jziWwEkTJMYuCkNqHwMKniE2KRX_mk9izJFRi4HsPmWxbzLfv9QiJ2elpCyPYHca/exec';
    // ============================================

    let currentType = 'Needs';
    const sessionLog = [];

    // Init date
    function init() {
      const now = new Date();
      const dateInput = document.getElementById('date');
      dateInput.value = now.toISOString().split('T')[0];

      const months = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
      document.getElementById('monthBadge').textContent = months[now.getMonth()] + ' ' + now.getFullYear();
      document.getElementById('dateDisplay').innerHTML =
        now.toLocaleDateString('en-US', { weekday: 'short' }) + '<br>' +
        now.getDate() + ' ' + months[now.getMonth()].slice(0,3);

      if (false) {
        document.getElementById('configBanner').style.display = 'none';
      }
    }

    function setType(type) {
      currentType = type;
      const btnNeeds = document.getElementById('btnNeeds');
      const btnWants = document.getElementById('btnWants');
      const select = document.getElementById('category');

      btnNeeds.className = 'type-btn' + (type === 'Needs' ? ' active-needs' : '');
      btnWants.className = 'type-btn' + (type === 'Wants' ? ' active-wants' : '');

      // Auto-select first option of the chosen group
      if (type === 'Needs') {
        select.querySelector('#needsGroup option').selected = true;
      } else {
        select.querySelector('#wantsGroup option').selected = true;
      }
    }

    async function submitEntry() {
      const amount = document.getElementById('amount').value;
      const category = document.getElementById('category').value;
      const description = document.getElementById('description').value;
      const date = document.getElementById('date').value;

      if (!amount || parseFloat(amount) <= 0) {
        showToast('請輸入金額 💸', 'error'); return;
      }
      if (!date) {
        showToast('請選擇日期', 'error'); return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '送出中...';

      const payload = { date, category, description, amount, type: currentType };

      if (SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbz_jziWwEkTJMYuCkNqHwMKniE2KRX_mk9izJFRi4HsPmWxbzLfv9QiJ2elpCyPYHca/exec') {
        // Demo mode — just show locally
        addToLocalLog(payload);
        showToast('（示範模式）記帳成功 ✓', 'success');
        resetForm();
        btn.disabled = false;
        btn.textContent = '記帳 →';
        return;
      }

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        addToLocalLog(payload);
        showToast('已存進 Google Sheet ✓', 'success');
        resetForm();
      } catch (err) {
        showToast('連線失敗，請檢查網址', 'error');
      }

      btn.disabled = false;
      btn.textContent = '記帳 →';
    }

    function resetForm() {
      document.getElementById('amount').value = '';
      document.getElementById('description').value = '';
    }

    function addToLocalLog(entry) {
      sessionLog.unshift(entry);
      const list = document.getElementById('logList');

      if (sessionLog.length === 1) list.innerHTML = '';

      const item = document.createElement('div');
      item.className = 'log-item';
      const dotClass = entry.type === 'Needs' ? 'needs' : 'wants';
      const desc = entry.description || '—';
      item.innerHTML = `
        <div class="log-dot ${dotClass}"></div>
        <div class="log-info">
          <div class="log-category">${entry.category}</div>
          <div class="log-desc">${desc}</div>
        </div>
        <div class="log-amount">$${parseFloat(entry.amount).toFixed(2)}</div>
      `;
      list.insertBefore(item, list.firstChild);
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + (type || '');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    init();
  </script>
</body>
</html>
